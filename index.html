<script>
// ★ Cloudflare WorkerのURL ★
const WORKER_URL = "https://throbbing-wind-3f73.9annak-sub.workers.dev";

// ★ ツイートに貼るリンク（公開URLに変更してね）★
const SITE_URL = "https://kanna-code.github.io/hobby-account/";

// ── データ定義 ────────────────────────────────────────────
const KAOMOJI = [
  "ദ്ദිᐢ- ̫-ᐢ₎","˘ ᴗ  ̫ ᴗ ˘","ᐡ• ·̫ •̥ᐡ","( ᴖ ̫ᴖ )",
  "ᐡ⸝⸝⊃ ·̭ •̥ ⸝⸝ᐡ","ᵕ ̥_ .̫ _ ̥ᵕ","꒰ – ·̫ – ꒱ﾉ🪄︎︎","꒰ᐡ⸝⸝σ̴̶̷̤ . σ̴̶̷̤⸝⸝꒱꜆",
  "૮(⁔｡o̶̶̷ ·̫ o̶̶̷｡⁔)ა","(ᐡㅠ ‧̫ ㅠᐡ)","꒰ ᐢ ◞‸◟ᐢ꒱","ᐡ⸝⸝> ·̫ <⸝⸝ᐡ",
  "(∩ ᵔ⩊ᵔ )⊃","( ՞߹ – ߹՞ )","₍ᐢっ ̫ ʚ̴̶̷̥̀ ᐢ₎","(∪｡•ω<｡∪)",
];
const EMOJI_LIST = [
  "😭","🥲","😻","💭","🎀","🫶","💘","🩷","⭐","🫠",
  "🌀","🤍","✊🏻","🥹","👈🏻","‼️","💛","🌟","✨","💞",
  "👶🏻","🪄","🐻‍❄️","💯","💖","🥂","🫧","💮","😿",
];
const VOCAB = {
  greeting:   ["ずっしょ","にっこり","出席確認","答え合わせ","ふたりぼっちの世界","モチベなくて","今日行くか迷ったんだけど","墓立てた","骨埋めた","推しの特等席！"],
  praise:     ["にゃーーいすき","できる男","しごでき","あまあま","ゲロ甘","大满足","いとちー","とくベチュ","はなまる","推しだいすき増した","推しも100点だった","やさしくて","全部わかってる","喜ばせる天才","推しがしてくれること全部たからもの","だいてんさいさん","ときめき"],
  thanks:     ["見つけてくれて","一生忘れられない","いちばん大切にしてくれて","過去一時間使ってくれて","初めて見る顔してくれて","大満足させてくれる","好きでいさせてくれてありがとう","しあわせ空間","いっぱいありがとう","これからもずーっと","たくさん考えてくれて","抱えきれないしあわせ","しあわせもの","予想以上のことしてくれて"],
  bodyReact:  ["心臓くるしー","心臓とくんとする","にんまり","見る時の顔がいちばん好き","頼んでないのに自分からやってくるのずるい","帰り道","抱えきれなくて幸せ歩いた","転げ落ちるくらいドカ笑いさせてくれて","顔ない"],
  special:    ["ひみつ","ずるい","特別","リベンジ","ここでいけると思ってなくてびっくりした","お友達からも褒めてもらえて","隣のお姉さんからも褒めてもらえて","行動で示してくれた","推ししかわたしのこと管理できない","天井だったのに見つけてくれた"],
  negative:   ["納得いく反応じゃなかったけど","困らせちゃってごめんね","わがままに付き合わせちゃってごめんね","今日行くか迷ったんだけど"],
};

// ── ユーティリティ ────────────────────────────────────────
const $ = id => document.getElementById(id);
const pickN = (arr, n) => [...arr].sort(() => Math.random() - .5).slice(0, Math.min(n, arr.length));
let lastResult = "";

// ── スライダー ────────────────────────────────────────────
function updSl(el, lid, labels) {
  const v = +el.value;
  $(lid).textContent = labels[v <= 33 ? 0 : v <= 66 ? 1 : 2];
  el.style.setProperty("--pct", v + "%");
}
function initSliders() {
  ["intensity","emojiLevel","lineBreak"].forEach(id => {
    const el = $(id);
    el.style.setProperty("--pct", el.value + "%");
  });
}

// ── プロンプト構築 ────────────────────────────────────────
function buildPrompt(inputText) {
  const iv = +$("intensity").value;
  const ev = +$("emojiLevel").value;
  const lv = +$("lineBreak").value;

  const iRule = iv <= 33
    ? "感情はひかえめ。でもホビ垢っぽい偏った主観は残す"
    : iv <= 66
    ? "大げさで浮かれてる。うるさすぎず、でもちゃんとマウントある"
    : "情緒爆発。重ため・誇張強め。しぬ（笑）なども使ってよい";

  const eRule = ev <= 33
    ? "絵文字・顔文字は0〜2個。なくてもよい"
    : ev <= 66
    ? "絵文字・顔文字は2〜5個。文の邪魔をしない"
    : "絵文字・顔文字は4〜8個。感情が強い箇所は絵文字を3個以上連続してもよい";

  const lRule = lv <= 33
    ? "改行は少なめ。2〜3行"
    : lv <= 66
    ? "改行は適度。3〜4行"
    : "改行はやや多め。短いフレーズで切るが5行以内";

  const emojiSample = pickN(EMOJI_LIST, 8).join(" ");
  const kaoSample   = pickN(KAOMOJI, 3).join("  ");
  const greet = pickN(VOCAB.greeting, 3).join("、");
  const pr    = pickN(VOCAB.praise, 4).join("、");
  const th    = pickN(VOCAB.thanks, 4).join("、");
  const br    = pickN(VOCAB.bodyReact, 3).join("、");
  const sp    = pickN(VOCAB.special, 3).join("、");

  const hints = [
    /ライブ|現場|コンサート|公演|舞台|イベ|チェキ|握手|対面/.test(inputText) && "現場・イベント系",
    /目が合|見てくれ|見つけ|視線|指さし|レス/.test(inputText)               && "見つけてもらった・認識された",
    /覚え|名前/.test(inputText)                                            && "覚えてもらった",
    /嬉し|幸せ|最高|好き|よかっ|かわい/.test(inputText)                     && "強い幸福感",
    /泣|無理|しんど|苦し|やば/.test(inputText)                             && "情緒が大きく揺れている",
    /笑|おもしろ|ニコ|にこ/.test(inputText)                                && "面白さ・多幸感",
    /上司|先輩|先生|怒|叱|仕事|バイト|学校|授業|課題|失敗|ミス/.test(inputText) && "日常の出来事（仕事・学校系）",
    /友達|友だち|お友|彼|彼女|推し以外/.test(inputText)                    && "日常の人間関係",
  ].filter(Boolean).join("、") || "特になし";

  return `あなたはX(Twitter)にいる日本語話者のオタクの「ホビ垢」文章変換者です。
ふつうの感想や出来事を、自然で解像度の高いオタクマウント構文に変換してください。
推し活の話だけでなく、日常の出来事（仕事・学校・友達など）もかわいくオタク構文に変換できます。

## ホビ垢構文の本質
・感想ではなく「自分と相手（推し・上司・友達など）の関係性の物語」として語る
・出来事を奇跡・特別なこととしてロマン化する、またはかわいく嘆く
・全体的に大げさに語るが、すべてを語るわけではなく、すこし内容を濁して書く
・相手の行動を「自分のためにしてくれた（または自分のせいで起きた）」として解釈する
・感情は誇張気味に（しんだ・記憶喪失・心臓くるしーなど）
・「しぬ（笑）」「（）」「（泣）」などのゆるい笑いもあり
・文法より気持ち優先・文が途中で途切れてもOK
・ひらがな多用（だいすき・しあわせ・ありがとう・かあいー・いとちー等）
・難しい言葉・漢字は使わない。やさしくてかわいい言葉だけ使う
・〜だった → 〜だた　のようにすこし崩した表記にする
・「だよ」「だよね」などの語尾はなるべく使わない。「むり」「しぬ」「ずるい」などで締める
・客観的なレポではなく、主観が暴走した文章にする

## 日常変換のルール（推し活以外の場合）
・上司＝「〇〇ちゃま」「〇〇さん」など親しみある呼び方にする
・怒られた・失敗した → かわいく自己嫌悪しつつ「またがんばる」「最高の思い出作る」で前向きに締める
・友達との出来事 → 「お友達」「〇〇ちゃん」で語る
・辛い出来事も基本はポジティブな余韻で終わらせる

## 表現例（参考）
・かわいい → かわいすぎてたいせつすぎる(∩ ᵔ⩊ᵔ )⊃⭐︎➰💛
・〇〇くん大好き → 〇〇ちゃんほんとーにいっちばん(∪｡•ω<｡∪)〰️🌟✨せかいいちたいせつ
・上司に怒られた → 上司ちゃまにおこられた (ᐡㅠ ‧̫ ㅠᐡ) こまらせちゃってごめんね😭😭😭またこれから最高の思い出作ろう💖🎀✨

## 絵文字・顔文字ルール
・${eRule}
・感情が強い場面（泣き・嬉しすぎ・むり等）では絵文字を3個以上連続して使う（例: 😭😭😭 / 🩷🩷🩷）
・顔文字は必ず1〜2個使う。絵文字だけで終わらせない
・使用する絵文字候補: ${emojiSample}
・顔文字候補（必ずここから選んで使う）: ${kaoSample}
・おもしろい場面では「ｗｗｗ」（全角小文字）を使ってよい
・ドキドキ・楽しみな場面では「┣¨‡ ┣¨‡」を文末に使ってよい

## 強度・形式ルール
・強度: ${iRule}
・${lRule}
・毎回すこしちがう表現にする（ゆらぎ必須）
・短くても密度を高くする

## 語録候補（文脈に合うものだけ。複数使う）
挨拶・状態: ${greet}
褒め言葉: ${pr}
感謝・反応: ${th}
身体反応: ${br}
マウント・特別感: ${sp}

## 長さのルール
・全体は80〜140字くらい
・2〜5行以内
・Xの1投稿として自然な長さ
・長いポエムにしない
・刺さった出来事は1〜2個に絞る

## 禁止事項
・難しい漢字や言葉を使うこと
・「だよ」「だよね」などのやわらかすぎる語尾
・語録をただ並べるだけの文章
・意味がわからない文章
・説明文や分析文
・入力にない出来事を勝手に追加すること
・「ホビ垢構文に変換しました」などの前置き
・「…」は使用しない

// ── UI ───────────────────────────────────────────────────
function showToast(msg, dur = 2200) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), dur);
}
function heartPop(x, y) {
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const el = document.createElement("div");
      el.className = "hp";
      el.textContent = "🩷";
      el.style.cssText = `font-size:${1 + Math.random() * .6}rem;left:${x + (Math.random() - .5) * 70}px;top:${y + (Math.random() - .5) * 50}px`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }, i * 60);
  }
}
const DECOS = ["🎀","🤍","⭐","🌸","💭","✨","🏆","🌷"];
function spawnDeco() {
  const el = document.createElement("div");
  el.className = "deco";
  el.textContent = DECOS[Math.floor(Math.random() * DECOS.length)];
  el.style.left = (Math.random() * 100) + "vw";
  el.style.fontSize = (1 + Math.random() * 1.3) + "rem";
  const d = 12 + Math.random() * 9;
  el.style.animationDuration = d + "s";
  el.style.animationDelay = (Math.random() * 3) + "s";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (d + 5) * 1000);
}
for (let i = 0; i < 8; i++) setTimeout(spawnDeco, i * 1700);
setInterval(spawnDeco, 3500);

// ── 変換 ─────────────────────────────────────────────────
async function onCvt(e, retry = false) {
  if (e) heartPop(e.clientX, e.clientY + window.scrollY);

  const inputText = $("inputText").value.trim();
  if (!inputText) { showToast("感想を入力してね💭"); $("inputText").focus(); return; }

  const btn = $("cvtBtn");
  btn.disabled = true;
  $("loadW").style.display = "block";
  $("outCard").classList.remove("show");
  $("errMsg").classList.remove("show");

  try {
    const prompt = buildPrompt(inputText);
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt }),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || "変換に失敗したよ");

    lastResult = data.result;
    $("outTxt").textContent = lastResult;

    const chars  = lastResult.length;
    const lines  = (lastResult.match(/\n/g) || []).length + 1;
    const emojis = (lastResult.match(/[\u{1F300}-\u{1FFFF}\u{2600}-\u{27BF}]/gu) || []).length;
    $("statsWrap").innerHTML =
      `<span class="sbadge">${chars}字</span>` +
      `<span class="sbadge">${lines}行</span>` +
      `<span class="sbadge">${emojis}絵文字</span>`;

    $("outCard").classList.add("show");
    showToast(retry ? "再変換したよ🔁" : "変換できたよ🎀 投稿してね！");
    setTimeout(() => $("outCard").scrollIntoView({ behavior: "smooth", block: "nearest" }), 100);

  } catch (err) {
    const el = $("errMsg");
    el.textContent = "エラーが出ちゃった…💦 " + err.message;
    el.classList.add("show");
  } finally {
    $("loadW").style.display = "none";
    btn.disabled = false;
  }
}

async function doCopy() {
  if (!lastResult) { showToast("先に変換してね💭"); return; }
  await navigator.clipboard.writeText(lastResult).catch(() => {});
  const b = $("copyBtn");
  b.textContent = "✓ コピー完了";
  b.classList.add("done");
  showToast("コピーしたよ🎀");
  setTimeout(() => { b.textContent = "📋 コピー"; b.classList.remove("done"); }, 2000);
}

function doTweet() {
  if (!lastResult) { showToast("先に変換してね💭"); return; }
  const tags = " #ホビ垢構文ジェネレーター #推し活";
  const link = SITE_URL !== "https://kanna-code.github.io/hobby-account/" ? "\n\n" + SITE_URL : "";
  const text  = lastResult + "\n" + tags + link;
  window.open("https://twitter.com/intent/tweet?text=" + encodeURIComponent(text), "_blank", "noopener");
}

document.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") onCvt(null);
});

initSliders();
