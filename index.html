<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ホビ垢構文変換ちゃん🎀</title>
<meta name="description" content="普通の感想をうざかわいいホビ垢構文に変換するジェネレーター✨">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700&family=Kosugi+Maru&display=swap" rel="stylesheet">
<style>
:root{
  --pk:#ffb7c5;--pk2:#f4889a;--pk3:#fff0f5;
  --pu:#c9a8e0;--pu2:#f2eafc;
  --cream:#fffbfd;--tx:#3d2535;--txs:#9a7a8a;
  --wh:#ffffff;--sh:rgba(244,136,154,.13);--rb:20px;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'Zen Maru Gothic',sans-serif;background:var(--cream);color:var(--tx);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 70% 55% at 10% 10%,rgba(255,183,197,.18) 0%,transparent 55%),
             radial-gradient(ellipse 55% 65% at 92% 88%,rgba(201,168,224,.14) 0%,transparent 55%)}
.deco{position:fixed;pointer-events:none;z-index:0;animation:fUp linear infinite;opacity:.08}
@keyframes fUp{0%{transform:translateY(108vh) rotate(0deg);opacity:0}8%{opacity:.08}92%{opacity:.08}100%{transform:translateY(-18vh) rotate(540deg);opacity:0}}
.app{position:relative;z-index:1;max-width:680px;margin:0 auto;padding:2rem 1.1rem 6rem}
.hd{text-align:center;margin-bottom:2rem;animation:fD .7s ease both}
@keyframes fD{from{opacity:0;transform:translateY(-14px)}to{opacity:1;transform:none}}
.hd-badge{display:inline-flex;align-items:center;gap:5px;background:linear-gradient(128deg,var(--pk2),var(--pu));color:#fff;font-size:.65rem;font-weight:700;padding:4px 15px;border-radius:99px;letter-spacing:.12em;margin-bottom:.8rem}
.hd h1{font-size:clamp(1.4rem,5vw,2rem);font-weight:700;line-height:1.3;margin-bottom:.4rem}
.hd h1 em{font-style:normal;background:linear-gradient(128deg,var(--pk2),var(--pu));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hd-sub{font-size:.78rem;color:var(--txs);line-height:1.85}
.card{background:var(--wh);border-radius:var(--rb);padding:1.4rem 1.5rem;margin-bottom:.9rem;
  box-shadow:0 3px 22px var(--sh),0 1px 3px rgba(0,0,0,.03);
  border:1.5px solid rgba(255,183,197,.2);animation:fU .5s ease both}
@keyframes fU{from{opacity:0;transform:translateY(11px)}to{opacity:1;transform:none}}
.card:nth-child(2){animation-delay:.06s}.card:nth-child(3){animation-delay:.11s}
.card:nth-child(4){animation-delay:.16s}.card:nth-child(5){animation-delay:.21s}
.ct{font-size:.71rem;font-weight:700;color:var(--pk2);letter-spacing:.09em;margin-bottom:1rem;display:flex;align-items:center;gap:6px}
.ct::before{content:'';width:6px;height:6px;border-radius:50%;flex-shrink:0;background:linear-gradient(135deg,var(--pk2),var(--pu))}
.ig label{display:block;font-size:.7rem;color:var(--txs);margin-bottom:4px;font-weight:500}
.ig textarea{width:100%;border:1.5px solid rgba(255,183,197,.38);border-radius:11px;
  padding:.58rem .85rem;font-family:'Zen Maru Gothic',sans-serif;font-size:.88rem;
  color:var(--tx);background:var(--pk3);outline:none;transition:all .18s;resize:none;
  min-height:120px;line-height:1.75}
.ig textarea:focus{border-color:var(--pk2);background:#fff;box-shadow:0 0 0 3px rgba(244,136,154,.11)}
.sliders{display:flex;flex-direction:column;gap:.9rem}
.sl-row{display:flex;flex-direction:column;gap:4px}
.sl-h{display:flex;justify-content:space-between;align-items:center}
.sl-lbl{font-size:.71rem;font-weight:500;color:var(--txs)}
.sl-val{font-size:.68rem;color:var(--pk2);font-weight:700;min-width:78px;text-align:right}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;
  background:linear-gradient(90deg,var(--pk) var(--pct,50%),rgba(200,150,180,.2) var(--pct,50%));
  border-radius:99px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:17px;height:17px;border-radius:50%;
  background:linear-gradient(135deg,var(--pk2),var(--pu));box-shadow:0 2px 7px rgba(244,136,154,.35);transition:transform .13s}
input[type=range]::-webkit-slider-thumb:hover{transform:scale(1.22)}
.btn-cvt{width:100%;background:linear-gradient(135deg,var(--pk2) 0%,#e87fa0 48%,var(--pu) 100%);
  color:#fff;border:none;border-radius:13px;padding:.95rem;
  font-family:'Zen Maru Gothic',sans-serif;font-size:.97rem;font-weight:700;
  cursor:pointer;letter-spacing:.05em;box-shadow:0 5px 20px rgba(244,136,154,.34);
  transition:all .2s;margin-top:.45rem}
.btn-cvt:hover:not(:disabled){transform:translateY(-2px);box-shadow:0 8px 26px rgba(244,136,154,.45)}
.btn-cvt:disabled{opacity:.58;cursor:not-allowed;transform:none}
#loadW{display:none}
.ld-in{display:flex;align-items:center;justify-content:center;gap:9px;padding:1.25rem;color:var(--txs);font-size:.8rem}
.dots span{width:6px;height:6px;border-radius:50%;display:inline-block;animation:dB 1.2s ease-in-out infinite}
.dots span:nth-child(1){background:var(--pk2)}.dots span:nth-child(2){background:#e087a0;animation-delay:.2s}.dots span:nth-child(3){background:var(--pu);animation-delay:.4s}
@keyframes dB{0%,80%,100%{transform:translateY(0)}40%{transform:translateY(-7px)}}
#outCard{display:none}#outCard.show{display:block}
.stats-wrap{display:flex;flex-wrap:wrap;gap:.4rem;margin-bottom:.8rem}
.sbadge{font-size:.66rem;font-weight:600;padding:2px 9px;border-radius:99px;background:var(--pk3);color:var(--txs);border:1px solid rgba(255,183,197,.35)}
.out-txt{background:linear-gradient(135deg,var(--pk3),var(--pu2));border:1.5px solid rgba(255,183,197,.35);
  border-radius:13px;padding:1.15rem 1.25rem;font-size:.91rem;line-height:1.95;
  color:var(--tx);white-space:pre-wrap;word-break:break-word;
  font-family:'Kosugi Maru',sans-serif;min-height:65px}
.out-acts{display:flex;gap:.55rem;margin-top:.85rem;flex-wrap:wrap}
.abt{flex:1;min-width:90px;border:1.5px solid rgba(255,183,197,.42);border-radius:10px;
  padding:.48rem .7rem;font-size:.73rem;font-weight:700;
  font-family:'Zen Maru Gothic',sans-serif;cursor:pointer;transition:all .16s;
  background:#fff;color:var(--pk2)}
.abt:hover{background:var(--pk3);transform:translateY(-1px)}
.abt.primary{background:linear-gradient(135deg,var(--pk2),var(--pu));border-color:transparent;color:#fff;box-shadow:0 3px 11px rgba(244,136,154,.26)}
.abt.done{background:#a8d8a8!important;border-color:transparent!important;color:#fff!important}
.tweet-btn{width:100%;margin-top:.55rem;background:linear-gradient(135deg,#1d9bf0,#1a8cd8);
  color:#fff;border:none;border-radius:10px;padding:.55rem;
  font-family:'Zen Maru Gothic',sans-serif;font-size:.8rem;font-weight:700;
  cursor:pointer;transition:all .18s;display:flex;align-items:center;justify-content:center;gap:6px;
  box-shadow:0 3px 12px rgba(29,155,240,.26)}
.tweet-btn:hover{transform:translateY(-1px)}
.tweet-btn svg{width:14px;height:14px;fill:#fff;flex-shrink:0}
.err{background:#fff0f0;border:1.5px solid #ffb3b3;color:#c0392b;border-radius:13px;
  padding:.85rem .95rem;font-size:.78rem;line-height:1.65;display:none;margin-bottom:.8rem}
.err.show{display:block}
.toast{position:fixed;bottom:1.8rem;left:50%;transform:translateX(-50%) translateY(14px);
  background:rgba(61,37,53,.9);color:#fff;padding:.5rem 1.3rem;border-radius:99px;
  font-size:.76rem;opacity:0;transition:all .25s;pointer-events:none;z-index:300;
  backdrop-filter:blur(6px);white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.hp{position:fixed;pointer-events:none;z-index:400;animation:hA 1.1s ease forwards}
@keyframes hA{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-75px) scale(1.45)}}
.hint{font-size:.63rem;color:var(--txs);margin-top:.4rem;line-height:1.5}
.footer{text-align:center;margin-top:2.2rem;font-size:.68rem;color:var(--txs);opacity:.6;line-height:1.85}
</style>
</head>
<body>
<div class="app">

<div class="hd">
  <div class="hd-badge">🎀 HOBBY ACCOUNT CONVERTER</div>
  <h1>ホビ垢構文<em>変換ちゃん</em></h1>
  <p class="hd-sub">普通の感想をうざかわいいホビ垢構文に変換するよ ✨<br>強度をカスタムして投稿まで一気にできるよ 💭</p>
</div>

<div class="card">
  <div class="ct">強度カスタム</div>
  <div class="sliders">
    <div class="sl-row">
      <div class="sl-h"><span class="sl-lbl">💪 感情の重さ</span><span class="sl-val" id="ivLbl">ふつう</span></div>
      <input type="range" id="intensity" min="0" max="100" value="50" oninput="updSl(this,'ivLbl',['軽め','ふつう','激重'])">
    </div>
    <div class="sl-row">
      <div class="sl-h"><span class="sl-lbl">✨ 絵文字の量</span><span class="sl-val" id="evLbl">ふつう</span></div>
      <input type="range" id="emojiLevel" min="0" max="100" value="55" oninput="updSl(this,'evLbl',['控えめ','ふつう','盛り盛り'])">
    </div>
    <div class="sl-row">
      <div class="sl-h"><span class="sl-lbl">↩️ 改行の多さ</span><span class="sl-val" id="lvLbl">ふつう</span></div>
      <input type="range" id="lineBreak" min="0" max="100" value="55" oninput="updSl(this,'lvLbl',['まとめて','ふつう','細かく'])">
    </div>
  </div>
</div>

<div class="card">
  <div class="ct">変換したい感想を入力</div>
  <div class="ig">
    <textarea id="inputText" placeholder="例）今日のライブ最高だった！目が合って心臓くるしかった。帰り道もずっとにこにこしてた。"></textarea>
  </div>
  <button class="btn-cvt" id="cvtBtn" onclick="onCvt(event)">✨ ホビ垢構文に変換する</button>
  <div class="hint">Ctrl / Cmd + Enter でも変換できるよ</div>
</div>

<div id="loadW"><div class="card"><div class="ld-in">
  <div class="dots"><span></span><span></span><span></span></div>
  <span>変換中だよ、ちょっとまってね🎀</span>
</div></div></div>
<div class="err" id="errMsg"></div>

<div class="card" id="outCard">
  <div class="ct">変換結果 💭</div>
  <div class="stats-wrap" id="statsWrap"></div>
  <div class="out-txt" id="outTxt"></div>
  <div class="out-acts">
    <button class="abt primary" id="copyBtn" onclick="doCopy()">📋 コピー</button>
    <button class="abt" onclick="onCvt(null,true)">🔁 再変換</button>
  </div>
  <button class="tweet-btn" onclick="doTweet()">
    <svg viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.742l7.748-8.876L1.254 2.25H8.08l4.253 5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
    X (Twitter) に投稿する
  </button>
</div>

<div class="footer">AIが文脈を読んで関係性の物語として変換するよ 🏆</div>
</div>
<div class="toast" id="toast"></div>

<script>
// ★ Cloudflare WorkerのURL ★
const WORKER_URL = "https://throbbing-wind-3f73.9annak-sub.workers.dev";

// ── データ定義 ────────────────────────────────────────────
const KAOMOJI = [
  "ദ്ദിᐢ- ̫-ᐢ₎","˘ ᴗ  ̫ ᴗ ˘","ᐡ• ·̫ •̥ᐡ","( ᴖ ̫ᴖ )",
  "ᐡ⸝⸝⊃ ·̭ •̥ ⸝⸝ᐡ","ᵕ ̥_ .̫ _ ̥ᵕ","꒰ – ·̫ – ꒱ﾉ",
  "(ᐡ｡› ·̫ ‹｡ᐡ )੭","(ᐡㅠ ‧̫ ㅠᐡ)","ᐡ⸝⸝> ·̫ <⸝⸝ᐡ",
];
const EMOJI_PAIRS = [
  "👼🏻💞","🆗💘","👶🏻🎀","😽💞","🪄✨","🐻‍❄️🩵",
  "✊🏻🌟","😭👈🏻","🆙💖","🥲🩶","🐑💤","🍒💬",
  "💯✨","🎀🩶","💭🎀","😻❤️‍🔥","🤩💖","🥂🫧",
  "😿🌀","🤝🏻🌟","🍼🩵","💮✨","😭⤴️",
];
const VOCAB = {
  greeting:     ["ずっしょ","にっこり","出席確認","答え合わせ","浮かれぽんち","モチベなくて","今日行くか迷ったんだけど","ふたりぼっちの世界","しんだ","満身創痍"],
  praise:       ["にゃーーいすき","できる男","しごでき","あまあま","ゲロ甘","いとちー","とくベチュ","はなまる","だいてんさいさん","ときめきこんてんChu","大满足","だいすきだいすき"],
  thanks:       ["見つけてくれて","覚えてくれて","一生忘れられない","いちばん大切にしてくれて","過去一時間使ってくれて","初めて見る顔してくれて","大満足させてくれる","好きでいさせてくれてありがとう","しあわせ空間","いっぱいありがとう","これからもずーっと","たくさん考えてくれて","抱えきれないしあわせ","予想以上のことしてくれて","指名してくれた","戻ってきてくれて"],
  bodyReaction: ["心臓くるしー","心臓とくんとする","にんまり","顔ない","帰り道","抱えきれなくて幸せ歩いた","転げ落ちるくらいドカ笑いさせてくれて","記憶喪失","すきすぎスキップ帰宅"],
  special:      ["ひみつ","ずるい","特別","奇跡","リベンジ","ここでいけると思ってなくてびっくりした","天井だったのに見つけてくれた","行動で示してくれた","特等席","答え合わせ"],
  negative:     ["納得いく反応じゃなかったけど","困らせちゃってごめんね","わがままに付き合わせちゃってごめんね"],
  oshiDynamic:  ["推しも100点だった","推しがしてくれること全部たからもの","推しだいすき増した","推しの特等席！","推ししかわたしのこと管理できない","推しがわたしのこと見る時の顔がいちばん好き","わたしを喜ばせる天才","わたしのこと全部わかってる","わたし@しあわせもの","頼んでないのに自分からやってくるのずるい","骨埋めた","墓立てた","推ししかいないんだ","推しもせかいいちしあわせでいてほしい","わたしのこと幸せにしてくれるひと"],
};

// ── ユーティリティ ────────────────────────────────────────
const $ = id => document.getElementById(id);
const pickN = (arr, n) => [...arr].sort(() => Math.random() - .5).slice(0, Math.min(n, arr.length));
let lastResult = "";

// ── スライダー ────────────────────────────────────────────
function updSl(el, lid, labels) {
  const v = +el.value;
  $(lid).textContent = labels[v <= 33 ? 0 : v <= 66 ? 1 : 2];
  el.style.setProperty("--pct", v + "%");
}
function initSliders() {
  ["intensity","emojiLevel","lineBreak"].forEach(id => {
    const el = $(id);
    el.style.setProperty("--pct", el.value + "%");
  });
}

// ── プロンプト構築 ────────────────────────────────────────
function buildPrompt(inputText){

  const iv=+$("intensity").value;
  const ev=+$("emojiLevel").value;
  const lv=+$("lineBreak").value;

  const iRule=iv<=33
    ?"感情表現は控えめ。ただし普通の感想文にはしない。ホビ垢特有の主観の偏りは残す"
    :iv<=66
    ?"ホビ垢らしい大げささ・誇張を適度に入れる。うるさすぎず、でもしっかり浮かれる"
    :"感情全開。重ため・誇張強め・情緒の暴走あり。ただし意味不明にはしない";

  const eRule=ev<=33
    ?"絵文字・顔文字は少なめ。0〜2個程度。なくてもよい"
    :ev<=66
    ?"絵文字・顔文字は適量。2〜5個程度。文の邪魔をしない"
    :"絵文字・顔文字はやや多め。4〜8個程度。ただし毎行つけすぎて読みにくくしない";

  const lRule=lv<=33
    ?"改行は少なめ。2〜3行程度"
    :lv<=66
    ?"改行は適度。3〜4行程度"
    :"改行はやや多め。短いフレーズで切るが、5行以内";

  const emojiSample=pickN(["😭","🥲","😻","💭","🎀","🫶","💘","🩷","⭐","🫠","🌀","🤍","✊🏻","🥹","👈🏻","‼️"],6).join(" ");
  const kaoSample=pickN(["ദ്ദിᐢ- ̫-ᐢ₎","˘ ᴗ  ̫ ᴗ ˘","ᐡ• ·̫ •̥ᐡ","( ᴖ ̫ᴖ )","ᐡ⸝⸝> ·̫ <⸝⸝ᐡ","(ᐡㅠ ‧̫ ㅠᐡ)"],2).join("  ");
  const greet=pickN(["ずっしょ","にっこり","出席確認","浮かれぽんち","しんだ"],3).join("、");
  const pr=pickN(["にゃーーいすき","しごでき","あまあま","はなまる","だいてんさいさん","だいすきだいすき"],4).join("、");
  const th=pickN(["見つけてくれて","覚えてくれて","一生忘れられない","しあわせ空間","いっぱいありがとう"],4).join("、");
  const br=pickN(["心臓くるしー","にんまり","帰り道ずっとにこにこ","記憶喪失","すきすぎスキップ帰宅"],3).join("、");
  const sp=pickN(["ひみつ","ずるい","特別","奇跡","特等席","答え合わせ"],3).join("、");
  const od=pickN([
    "自分のこと見つけてもらえた気がする",
    "今日のあれたぶん一生引きずる",
    "好きが増した",
    "自分だけが受け取ったみたいで苦しい",
    "しあわせすぎて抱えきれない"
  ],4).join("、");

  const hints = [
    /ライブ|現場|コンサート|公演|舞台|イベ|チェキ|握手|対面/.test(inputText) && "現場・イベント系",
    /目が合|見てくれ|見つけ|視線|指さし|レス/.test(inputText) && "見つけてもらった・認識されたかもしれない体験",
    /覚え|名前/.test(inputText) && "覚えてもらったかもしれない体験",
    /嬉し|幸せ|最高|好き|よかっ|かわい/.test(inputText) && "強い幸福感や愛着",
    /泣|無理|しんど|苦し|やば/.test(inputText) && "情緒が大きく揺れている",
    /笑|おもしろ|ニコ|にこ/.test(inputText) && "面白さ・多幸感",
  ].filter(Boolean).join("、") || "特になし";

  return `
あなたはX(Twitter)にいる日本語話者のオタクの「ホビ垢」文章変換者です。
普通の感想を、自然で解像度の高いホビ垢構文に変換してください。

## ホビ垢構文の本質
・感想ではなく「自分と推しの関係性の物語」として語る
・出来事を奇跡・特別なこととしてロマン化する
・全体的に大げさに語るが、すべてを語るわけではなく、少し内容を濁して書く
・演者の行動を「自分のためにしてくれた」として解釈する
・「見つけてもらった」「覚えてもらった」体験を特別なイベントとして描写する
・感情は誇張気味に（しんだ・記憶喪失・心臓くるしーなど）
・文法より気持ち優先・文が途中で途切れてもOK
・ひらがな多用（だいすき・しあわせ・ありがとう・すきすぎ等）
・客観的なレポではなく、主観が暴走した文章にする
・ただし意味が通る範囲に保つ

## 絵文字・顔文字ルール
・${eRule}
・使用する絵文字候補: ${emojiSample}
・顔文字候補: ${kaoSample}
・号泣系の絵文字は、強く刺さった場面では連続して2〜3個使ってよい
・面白いことを語るときは、文脈に合う場合のみ「ｗｗｗ」を使ってよい
・ドキドキ・楽しみな気持ちの場面では、文脈に合う場合のみ「┣¨‡ ┣¨‡」を文末に使ってよい
・ただし記号や絵文字は入れすぎず、文章の温度感を優先する

## 強度・形式ルール
・強度: ${iRule}
・${lRule}
・毎回わずかに異なる表現にする（ゆらぎ必須）
・短くても密度を高くする
・同じ意味の言い換えを重ねすぎない

## 語録候補（文脈に合うものだけ）

// ── UI ───────────────────────────────────────────────────
function showToast(msg, dur = 2200) {
  const t = $("toast");
  t.textContent = msg;
  t.classList.add("show");
  setTimeout(() => t.classList.remove("show"), dur);
}
function heartPop(x, y) {
  for (let i = 0; i < 6; i++) {
    setTimeout(() => {
      const el = document.createElement("div");
      el.className = "hp";
      el.textContent = "🩷";
      el.style.cssText = `font-size:${1 + Math.random() * .6}rem;left:${x + (Math.random() - .5) * 70}px;top:${y + (Math.random() - .5) * 50}px`;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 1200);
    }, i * 60);
  }
}

// 浮遊デコ
const DECOS = ["🎀","🤍","⭐","🌸","💭","✨","🏆","🌷"];
function spawnDeco() {
  const el = document.createElement("div");
  el.className = "deco";
  el.textContent = DECOS[Math.floor(Math.random() * DECOS.length)];
  el.style.left = (Math.random() * 100) + "vw";
  el.style.fontSize = (1 + Math.random() * 1.3) + "rem";
  const d = 12 + Math.random() * 9;
  el.style.animationDuration = d + "s";
  el.style.animationDelay = (Math.random() * 3) + "s";
  document.body.appendChild(el);
  setTimeout(() => el.remove(), (d + 5) * 1000);
}
for (let i = 0; i < 8; i++) setTimeout(spawnDeco, i * 1700);
setInterval(spawnDeco, 3500);

// ── 変換 ─────────────────────────────────────────────────
async function onCvt(e, retry = false) {
  if (e) heartPop(e.clientX, e.clientY + window.scrollY);

  const inputText = $("inputText").value.trim();
  if (!inputText) { showToast("感想を入力してね💭"); $("inputText").focus(); return; }

  const btn = $("cvtBtn");
  btn.disabled = true;
  $("loadW").style.display = "block";
  $("outCard").classList.remove("show");
  $("errMsg").classList.remove("show");

  try {
    const prompt = buildPrompt(inputText);
    const res = await fetch(WORKER_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ prompt }),
    });
    const data = await res.json();
    if (!res.ok || data.error) throw new Error(data.error || "変換に失敗したよ");

    lastResult = data.result;
    $("outTxt").textContent = lastResult;

    const chars  = lastResult.length;
    const lines  = (lastResult.match(/\n/g) || []).length + 1;
    const emojis = (lastResult.match(/[\u{1F300}-\u{1FFFF}\u{2600}-\u{27BF}]/gu) || []).length;
    $("statsWrap").innerHTML =
      `<span class="sbadge">${chars}字</span>` +
      `<span class="sbadge">${lines}行</span>` +
      `<span class="sbadge">${emojis}絵文字</span>`;

    $("outCard").classList.add("show");
    showToast(retry ? "再変換したよ🔁" : "変換できたよ🎀 投稿してね！");
    setTimeout(() => $("outCard").scrollIntoView({ behavior: "smooth", block: "nearest" }), 100);

  } catch (err) {
    const el = $("errMsg");
    el.textContent = "エラーが出ちゃった…💦 " + err.message;
    el.classList.add("show");
  } finally {
    $("loadW").style.display = "none";
    btn.disabled = false;
  }
}

async function doCopy() {
  if (!lastResult) { showToast("先に変換してね💭"); return; }
  await navigator.clipboard.writeText(lastResult).catch(() => {});
  const b = $("copyBtn");
  b.textContent = "✓ コピー完了";
  b.classList.add("done");
  showToast("コピーしたよ🎀");
  setTimeout(() => { b.textContent = "📋 コピー"; b.classList.remove("done"); }, 2000);
}

function doTweet() {
  if (!lastResult) { showToast("先に変換してね💭"); return; }
  const ht = "\n\n#ホビ垢構文ジェネレーター #ホビ垢 #推し活";
  window.open("https://twitter.com/intent/tweet?text=" + encodeURIComponent(lastResult + ht), "_blank", "noopener");
}

document.addEventListener("keydown", e => {
  if ((e.ctrlKey || e.metaKey) && e.key === "Enter") onCvt(null);
});

initSliders();
</script>
